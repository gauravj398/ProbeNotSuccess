<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Probe Not Success Data</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="flex flex-col justify-between min-h-screen p-4 font-sans text-gray-800">

    <!-- Header Section -->
    <header class="w-full text-center py-4 bg-white/10 backdrop-blur-md rounded-xl shadow-lg border border-white/20 mb-4">
        <h1 class="text-2xl md:text-3xl font-black text-white tracking-wide drop-shadow-md">
            Probe Not Success Data
        </h1>
    </header>

    <!-- Logo and Login Card Container -->
    <main class="flex-grow flex flex-col items-center justify-center w-full space-y-4">
        
        <!-- --- LOGO SECTION (Header ke niche aur hamesha dikhega) --- -->
        <div class="flex justify-center w-full max-w-sm">
            <!-- max-h-24 se logo mobile me bahut bada nahi dikhega, object-contain se shape asli rahegi -->
            <img src="logo.png" alt="Company Logo" class="max-h-24 max-w-xs object-contain drop-shadow-lg">
        </div>

        <!-- Login Card -->
        <div class="bg-white/95 backdrop-blur-sm p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-indigo-100 transition duration-300 hover:shadow-indigo-500/10">
            <div class="text-center mb-5">
                <div class="inline-flex p-3 bg-indigo-100 rounded-full text-indigo-600 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-gray-800">Sign In</h2>
                <p class="text-xs text-gray-500 mt-1">Please log in to enter survey data</p>
            </div>

            <!-- Standard HTML form to enable browser credentials saving -->
            <form id="loginForm" class="space-y-4" autocomplete="on">
                <div>
                    <label class="block text-xs font-bold text-indigo-950 uppercase tracking-wider mb-1">10-Digit Mobile Number *</label>
                    <input type="tel" id="username" name="username" required autocomplete="username" inputmode="numeric" pattern="[0-9]{10}"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition text-sm bg-gray-50/50" 
                        placeholder="Enter 10 digit mobile no.">
                </div>

                <div>
                    <label class="block text-xs font-bold text-indigo-950 uppercase tracking-wider mb-1">Password *</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition text-sm bg-gray-50/50" 
                        placeholder="••••••••">
                </div>

                <!-- Remember Me Checkbox -->
                <div class="flex items-center">
                    <input id="remember_me" name="remember_me" type="checkbox" checked class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="remember_me" class="ml-2 block text-xs text-gray-600 font-medium">Remember password on browser</label>
                </div>

                <div id="errorMessage" class="text-red-600 text-xs font-semibold text-center hidden bg-red-50 p-2 rounded-lg border border-red-200">
                    Invalid Username or Password!
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 rounded-xl shadow-md shadow-indigo-200 transition transform active:scale-95 text-sm uppercase tracking-wider mt-2">
                    Login
                </button>
            </form>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="w-full text-center py-3 text-white/80 font-semibold text-sm tracking-wide mt-6 border-t border-white/10 pt-4">
        Gaurav Jain @ 2026
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Authentication Credentials
            if (user.length === 10 && !isNaN(user) && pass === 'dvvnl@12345') {
                document.getElementById('errorMessage').classList.add('hidden');
                
                // Redirecting to form dashboard page
                window.location.href = "dashboard.html";
            } else {
                const errDiv = document.getElementById('errorMessage');
                errDiv.classList.remove('hidden');
                if(pass !== 'dvvnl@12345') {
                    errDiv.innerText = "Incorrect Password! Try again.";
                } else {
                    errDiv.innerText = "Pls Enter Valid 10-Digit Mobile Number!";
                }
            }
        });
    </script>
</body>
</html>
