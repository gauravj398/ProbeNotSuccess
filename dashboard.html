<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry - Probe Not Success Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        .header-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen font-sans">

    <header class="header-gradient text-white p-4 shadow-xl sticky top-0 z-50 flex justify-between items-center px-4 md:px-8">
        <h1 class="text-base md:text-xl font-extrabold tracking-wide drop-shadow-sm">
            Probe Not Success Data
        </h1>
        <a href="index.html" class="bg-red-500 hover:bg-red-600 text-white font-bold text-xs px-3 py-2 rounded-xl shadow-md transition transform active:scale-95 uppercase tracking-wider flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
        </a>
    </header>

    <main class="flex-grow max-w-lg w-full mx-auto p-4">
        
        <form id="dataForm" class="bg-white p-5 rounded-2xl shadow-xl border border-gray-100 space-y-4">
            <div class="flex justify-between items-center border-b pb-2 mb-2">
                <h2 class="text-lg font-black text-blue-900 uppercase tracking-tight">Survey Data Entry Form</h2>
                <span class="text-[10px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">All fields required except Other Remarks</span>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Division Name *</label>
                <select id="division" required class="w-full px-3 py-2.5 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none">
                    <option value="">-- Select Division --</option>
                    <option value="EDD FIROZABAD">EDD FIROZABAD</option>
                    <option value="EDD JASRANA">EDD JASRANA</option>
                    <option value="EDD SHIKOHABAD">EDD SHIKOHABAD</option>
                    <option value="EDD SIRSAGANJ">EDD SIRSAGANJ</option>
                    <option value="EDD TUNDLA">EDD TUNDLA</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">ACCT ID *</label>
                <input type="text" id="acctId" required inputmode="numeric" maxlength="10"
                    class="w-full px-3 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none"
                    placeholder="Enter 10 digit Account ID">
                <p id="acctError" class="text-red-600 text-xs font-semibold mt-1 hidden">Pls Enter Valid Acct Number</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Meter Number *</label>
                <input type="text" id="meterNumber" required
                    class="w-full px-3 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none"
                    placeholder="Enter Meter Number">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Meter Make *</label>
                <input type="text" id="meterMake" required
                    class="w-full px-3 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none"
                    placeholder="Enter Manufacturer / Make">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Meter M/F Date *</label>
                <input type="text" id="meterMfDate" required
                    class="w-full px-3 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none"
                    placeholder="e.g. DD-MM-YYYY or MM/YYYY">
            </div>

            <div class="grid grid-cols-2 gap-2 bg-slate-50 p-2.5 rounded-xl border border-slate-200">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">Latitude</label>
                    <input type="text" id="formLat" readonly placeholder="Waiting GPS..." class="w-full bg-transparent text-xs font-mono text-slate-700 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">Longitude</label>
                    <input type="text" id="formLng" readonly placeholder="Waiting GPS..." class="w-full bg-transparent text-xs font-mono text-slate-700 outline-none">
                </div>
            </div>

            <div class="border-2 border-dashed border-blue-200 p-4 rounded-2xl text-center bg-blue-50/40">
                <label class="block text-xs font-bold text-blue-900 uppercase mb-2">Meter Image Capture *</label>
                
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                
                <button type="button" onclick="document.getElementById('cameraInput').click()" 
                    class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow inline-flex items-center gap-2 uppercase tracking-wider transition transform active:scale-95">
                    📸 Open Camera
                </button>

                <div class="relative mt-3 hidden" id="previewContainer">
                    <p class="text-[11px] text-emerald-700 font-bold mb-1 flex items-center justify-center gap-1">
                        ✨ Photo Stamped with Live GPS Details Successfully!
                    </p>
                    <canvas id="canvasPreview" class="w-full rounded-xl shadow-md border border-emerald-200 bg-black"></canvas>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Remarks *</label>
                <select id="remarks" required class="w-full px-3 py-2.5 rounded-xl border border-gray-300 bg-white focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none">
                    <option value="">-- Select Status Remarks --</option>
                    <option value="Meter Box Improper">Meter Box Improper</option>
                    <option value="Meter Port Dirty">Meter Port Dirty</option>
                    <option value="Meter Defective">Meter Defective</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Other Remarks <span class="text-gray-400 font-normal">(Optional)</span></label>
                <textarea id="otherRemarks" rows="2" class="w-full px-3 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 text-sm focus:outline-none" placeholder="Any secondary details (can leave blank)"></textarea>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-700 to-indigo-700 hover:from-blue-800 hover:to-indigo-800 text-white font-extrabold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition transform active:scale-95 text-sm uppercase tracking-widest pt-3">
                Submit Entry Data
            </button>
        </form>
    </main>

    <footer class="w-full text-center py-3.5 header-gradient text-white font-bold text-xs tracking-wider mt-6 shadow-inner">
        Gaurav Jain @ 2026
    </footer>

    <script>
        let currentLat = "";
        let currentLng = "";
        let formattedAddress = "Fetching nearby reverse location...";

        window.addEventListener('load', () => {
            fetchLiveGPSLocation();
        });

        function fetchLiveGPSLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    currentLat = position.coords.latitude.toFixed(6);
                    currentLng = position.coords.longitude.toFixed(6);
                    
                    document.getElementById('formLat').value = currentLat;
                    document.getElementById('formLng').value = currentLng;

                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}&zoom=18&addressdetails=1`)
                        .then(res => res.json())
                        .then(data => {
                            let addr = data.address;
                            let area = addr.suburb || addr.village || addr.neighbourhood || addr.road || "Local Area";
                            let city = addr.city || addr.town || addr.village || "";
                            let distt = addr.county || addr.state_district || "";
                            let state = addr.state || "";

                            formattedAddress = `Area: ${area}, City: ${city}\\nDistt: ${distt}, State: ${state}`;
                        })
                        .catch(() => {
                            formattedAddress = "Area Name: Fetch Timeout / Offline Network";
                        });
                }, () => {
                    alert("Form strictly requires high accuracy GPS permission to be submitted.");
                }, { enableHighAccuracy: true, timeout: 12000 });
            } else {
                alert("GPS Geolocation system not supported by this device browser.");
            }
        }

        // Camera capture and drawing Watermark Stamp
        document.getElementById('cameraInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvasPreview');
                    const ctx = canvas.getContext('2d');

                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const padding = canvas.width * 0.03;
                    const fontHeight = Math.max(16, Math.floor(canvas.width * 0.026));
                    
                    ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                    ctx.fillRect(0, canvas.height - (fontHeight * 6.5), canvas.width, fontHeight * 6.5);

                    ctx.fillStyle = "#FFFFFF";
                    ctx.font = `bold ${fontHeight}px Arial`;
                    ctx.textBaseline = "top";

                    // --- UPDATED: 12-Hours AM/PM Format Conversion ---
                    const now = new Date();
                    const dayString = now.toLocaleDateString('en-US', { weekday: 'long' });
                    
                    let hours = now.getHours();
                    let minutes = now.getMinutes();
                    let seconds = now.getSeconds();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12;
                    hours = hours ? hours : 12; // 0 ko 12 banana
                    minutes = minutes < 10 ? '0' + minutes : minutes;
                    seconds = seconds < 10 ? '0' + seconds : seconds;
                    const formattedTime = `${hours}:${minutes}:${seconds} ${ampm}`;

                    const timeDateStr = `Day & Date: ${dayString}, ${now.toLocaleDateString()} | Time: ${formattedTime}`;
                    const gpsString = `GPS Lat: ${currentLat || "N/A"} | Long: ${currentLng || "N/A"}`;

                    let currentYPosition = canvas.height - (fontHeight * 5.8);
                    ctx.fillText(timeDateStr, padding, currentYPosition);
                    
                    currentYPosition += fontHeight * 1.3;
                    ctx.fillText(gpsString, padding, currentYPosition);

                    currentYPosition += fontHeight * 1.3;
                    let splitLines = formattedAddress.split('\\n');
                    splitLines.forEach(ln => {
                        ctx.fillText(ln, padding, currentYPosition);
                        currentYPosition += fontHeight * 1.3;
                    });

                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Form fields validation on Submit
        // --- DASHBOARD KA SUBMIT FUNCTION (REPLACE YAHAN SE KAREIN) ---
// --- DASHBOARD KA UPDATED SUBMIT FUNCTION (ISSE REPLACE KAREIN) ---
document.getElementById('dataForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const acctField = document.getElementById('acctId').value;
    const acctErr = document.getElementById('acctError');

    // 10-digit validation check
    if (acctField.length !== 10 || isNaN(acctField)) {
        acctErr.classList.remove('hidden');
        acctErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
    } else {
        acctErr.classList.add('hidden');
    }

    if(!currentLat || !currentLng) {
        alert("GPS Coordinates are not ready yet. Please ensure device Location is ON and refresh.");
        return;
    }

    if(document.getElementById('previewContainer').classList.contains('hidden')) {
        alert("Photo Capture is compulsory. Please snap a picture of the Meter.");
        return;
    }

    const canvas = document.getElementById('canvasPreview');
    const finalStampedImageBase64 = canvas.toDataURL('image/jpeg', 0.8);

    // Login page se mobile number uthana
    let loginMobile = new URLSearchParams(window.location.search).get('user') || "Unknown_User";

    const submissionPayload = {
        userId: loginMobile,
        division: document.getElementById('division').value,
        acctId: acctField,
        meterNumber: document.getElementById('meterNumber').value,
        meterMake: document.getElementById('meterMake').value,
        meterMfDate: document.getElementById('meterMfDate').value,
        latitude: currentLat,
        longitude: currentLng,
        remarks: document.getElementById('remarks').value,
        otherRemarks: document.getElementById('otherRemarks').value,
        photoBase64: finalStampedImageBase64
    };

    // Google Web App URL yahan daalein
    const googleWebAppUrl = "YAHAN_APNA_GOOGLE_WEB_APP_URL_PASTE_KAREIN";

    // --- BADLAAV: Turant success message dikhana aur form reset karna ---
    alert("Data Submitted Successfully!");
    
    // Form aur photo preview ko turant saaf/reset karna
    document.getElementById('dataForm').reset();
    document.getElementById('previewContainer').classList.add('hidden');

    // Server request ab background me chalti rahegii, user ko wait nahi karna padega
    fetch(googleWebAppUrl, {
        method: "POST",
        mode: "no-cors", 
        cache: "no-cache",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(submissionPayload)
    })
    .then(() => {
        console.log("Background Sync Complete: Data saved to Google Sheet.");
    })
    .catch(err => {
        console.error("Background Sync Failed: ", err);
    });
});   
   </script>
</body>
</html>
